<div xmlns="http://www.w3.org/1999/xhtml" lang="en" xmlns:f="http://typo3.org/ns/fluid/ViewHelpers">

<f:section name="ControlBar">
  <div class="control-bar">
      <div class="header-bar">
        <nav>
          <f:cObject typoscriptObjectPath="lib.menu.language" />
          <f:cObject typoscriptObjectPath="lib.menu.viewernav" />
          <button type="button" class="nav-toggle">
                <span class="nav-label">Open Navigation</span>
                <span class="nav-button-bar"></span>
                <span class="nav-button-bar"></span>
                <span class="nav-button-bar"></span>
                <span class="nav-button-bar"></span>
          </button>
        </nav>
      </div>

      <div class="tab">
          <button class="tablinks" onclick="openLink(event, 'toc-wrapper')">London</button>
          <button class="tablinks" onclick="openLink(event, 'search-wrapper')">Paris</button>
          <button class="tablinks" onclick="openLink(event, 'fulltext-wrapper')">Tokyo</button>
          <button class="tablinks" onclick="openLink(event, 'download-wrapper')">Tokyo</button>
          <button class="tablinks" onclick="openLink(event, 'image-manipulation-wrapper')">Tokyo</button>
          <button class="tablinks" onclick="openLink(event, 'social-wrapper')">Tokyo</button>
      </div>

      <div id="toc-wrapper" class="toc-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="search-wrapper" class="search-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='search' extensionName='dfgviewer' />"></div>
      </div>

      <div id="fulltext-wrapper" class="fulltext-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="download-wrapper" class="download-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="image-manipulation-wrapper" class="image-manipulation-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="social-wrapper" class="social-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>
  </div>
</f:section>

</div>
