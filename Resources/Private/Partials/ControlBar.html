{namespace dv=Slub\Dfgviewer\ViewHelpers}

<div xmlns="http://www.w3.org/1999/xhtml" lang="en" xmlns:f="http://typo3.org/ns/fluid/ViewHelpers">

<f:section name="ControlBar">
  <div class="control-bar">
      <div class="tab">
          <button class="btn tab-links" onclick="openLink(event, 'toc-wrapper')"><f:translate key='toc' extensionName='dfgviewer' /></button>
          <button class="btn tab-links" onclick="openLink(event, 'search-wrapper')"><f:translate key='search' extensionName='dfgviewer' /></button>
          <button class="btn tab-links" onclick="openLink(event, 'fulltext-wrapper')"><f:translate key='fulltext' extensionName='dfgviewer' /></button>
          <button class="btn tab-links" onclick="openLink(event, 'download-wrapper')"><f:translate key='download' extensionName='dfgviewer' /></button>
          <button class="btn tab-links" onclick="openLink(event, 'image-manipulation-wrapper')"><f:translate key='image.manipulation' extensionName='dfgviewer' /></button>
          <button class="btn tab-links" onclick="openLink(event, 'share-wrapper')"><f:translate key='share' extensionName='dfgviewer' /></button>
      </div>

      <div id="toc-wrapper" class="tab-content toc-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="search-wrapper" class="tab-content search-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='search' extensionName='dfgviewer' />"></div>
      </div>

      <div id="fulltext-wrapper" class="tab-content fulltext-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="download-wrapper" class="tab-content download-wrapper">
          <ul>
            <f:if condition="<dv:piVars var=\"double\" default=\"0\" /> == 1">
              <f:then>
                <li>
                  <f:link.external uri="<dv:downloadLinks type='page-left' pagenumber='{gp-page}' />" class="download-page" title="<f:translate key='download.leftPage' extensionName='dfgviewer' />"><f:translate key="download.leftPage"  extensionName="dfgviewer" /></f:link.external>
                </li>
                <f:if condition="<dv:downloadLinks type='page-right' pagenumber='{gp-page}' /> !=''">
                  <li>
                    <f:link.external uri="<dv:downloadLinks type='page-right' pagenumber='{gp-page}' />" class="download-page" title="<f:translate key='download.rightPage' extensionName='dfgviewer' />"><f:translate key="download.rightPage"  extensionName="dfgviewer" /></f:link.external>
                  </li>
                </f:if>
              </f:then>
              <f:else>
                <f:if condition="<dv:downloadLinks type='page-left' pagenumber='{gp-page}' /> !=''">
                  <li>
                    <f:link.external uri="<dv:downloadLinks type='page-left' pagenumber='{gp-page}' />" class="download-page" title="<f:translate key='download.singlePage' extensionName='dfgviewer' />"><f:translate key="download.singlePage"  extensionName="dfgviewer" /></f:link.external>
                  </li>
                </f:if>
            </f:else>
          </f:if>
          <f:if condition="<dv:downloadLinks type='work' /> !=''">
            <f:then>
              <li>
                <f:link.external
                  uri="<dv:downloadLinks type='work' />"
                  class="download-document"
                  target="_blank"
                  title="<f:translate key='download.work' extensionName='dfgviewer' />"><f:translate key="download.work"  extensionName="dfgviewer" /></f:link.external>
              </li>
            </f:then>
            <f:else>
              <f:if condition="<dv:xpath xpath='(//mets:mets/mets:dmdSec/mets:mdWrap/mets:xmlData/mods:mods/mods:extension/slub:slub/slub:id[@type=\'digital\'])[1]' />">
                <f:alias map="{xpathDownload: '//mets:fileSec/mets:fileGrp[@USE=\'DOWNLOAD\']//mets:file/mets:FLocat/@xlink:href'}">
                  <li>
                    <f:link.external
                      uri="<dv:format.subStringLast string=\"{dv:xpath(xpath:'(({xpathDownload})[1])')}\" needle=\"/\" />/<dv:xpath xpath='(//mets:mets/mets:dmdSec/mets:mdWrap/mets:xmlData/mods:mods/mods:extension/slub:slub/slub:id[@type=\'digital\'])[1]' />.pdf"
                      class="download-document"
                      target="_blank"
                      title="<f:translate key='download.work' extensionName='dfgviewer' />"><f:translate key="download.work"  extensionName="dfgviewer" />
                    </f:link.external>
                  </li>
                </f:alias>
              </f:if>
            </f:else>
          </f:if>
            </ul>
          <div class="offcanvas-toggle" title="<f:translate key='download' extensionName='dfgviewer' />"></div>
      </div>

      <div id="image-manipulation-wrapper" class="tab-content image-manipulation-wrapper">
          <f:cObject typoscriptObjectPath="plugin.tx_dlf_tableofcontents" />
          <div class="offcanvas-toggle" title="<f:translate key='toc' extensionName='dfgviewer' />"></div>
      </div>

      <div id="share-wrapper" class="tab-content share-wrapper">
          <ul>
              <li>
                <f:if condition="<dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE=\"DVLINKS\"]/mets:xmlData/dv:links/dv:presentation)[1]' />">
                  <f:then>
                    <f:link.external uri="<dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE=\"DVLINKS\"]/mets:xmlData/dv:links/dv:presentation)[1]' htmlspecialchars='FALSE' />" class="local-presentation" title="<f:translate key='provider.local_presentation' extensionName='dfgviewer' />"><f:translate key='provider.local_presentation' extensionName='dfgviewer' /></f:link.external>
                  </f:then>
                  <f:else>
                    <span class="local-presentation" title="<f:translate key='provider.no_local_presentation' extensionName='dfgviewer' />"><f:translate key='provider.no_local_presentation' extensionName='dfgviewer' /></span>
                  </f:else>
                </f:if>
              </li>
              <f:for each="{0: '1', 1: '2', 2: '3'}" as="index">
                <f:if condition="<dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE=\"DVLINKS\"]/mets:xmlData/dv:links/dv:reference)[{index}]' />">
                  <li>
                    <f:if condition="<dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE=\"DVLINKS\"]/mets:xmlData/dv:links/dv:reference/@linktext)[{index}]' />">
                      <f:then>
                        <f:link.external uri="<dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE=\"DVLINKS\"]/mets:xmlData/dv:links/dv:reference)[{index}]' htmlspecialchars='FALSE' />" class="local-catalog" title="<f:translate key='provider.local_catalogue' extensionName='dfgviewer' />"><dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE="DVLINKS"]/mets:xmlData/dv:links/dv:reference/@linktext)[{index}]' /></f:link.external>
                      </f:then>
                      <f:else>
                        <f:link.external uri="<dv:xpath xpath='(//mets:amdSec/mets:digiprovMD/mets:mdWrap[@OTHERMDTYPE=\"DVLINKS\"]/mets:xmlData/dv:links/dv:reference)[{index}]' htmlspecialchars='FALSE' />" class="local-catalog" title="<f:translate key='provider.local_catalogue' extensionName='dfgviewer' />"><f:translate key='provider.local_catalogue' extensionName='dfgviewer' /></f:link.external>
                      </f:else>
                    </f:if>
                  </li>
                </f:if>
              </f:for>
              <li>
                  <f:link.email email="<dv:xpath xpath='(//mets:amdSec/mets:rightsMD/mets:mdWrap[@OTHERMDTYPE=\"DVRIGHTS\"]/mets:xmlData/dv:rights/dv:ownerContact)[1]' htmlspecialchars='FALSE' />" class="local-contact" title="<f:translate key='provider.email_provider' extensionName='dfgviewer' /> (<dv:xpath xpath='//mets:amdSec/mets:rightsMD/mets:mdWrap[@OTHERMDTYPE=\'DVRIGHTS\']/mets:xmlData/dv:rights/dv:owner' />)"><f:translate key='provider.email_provider' extensionName='dfgviewer' /></f:link.email>
              </li>
                <f:cObject typoscriptObjectPath="plugin.tx_dfgviewer_uri" />
            </ul>
          <div class="offcanvas-toggle" title="<f:translate key='share' extensionName='dfgviewer' />"></div>
      </div>
  </div>
</f:section>

</div>
